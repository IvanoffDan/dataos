name: Debug OIDC
on: workflow_dispatch
permissions:
  id-token: write
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token claims
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken();
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString());
            core.info('=== OIDC Token Claims ===');
            core.info(`repository: ${payload.repository}`);
            core.info(`repository_owner: ${payload.repository_owner}`);
            core.info(`sub: ${payload.sub}`);
            core.info(`aud: ${payload.aud}`);
            core.info(`iss: ${payload.iss}`);
