name: Dagster Cloud Deploy

on:
  push:
    branches: [main]
    paths:
      - "pipeline/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dagster-cloud CLI
        run: pip install dagster-cloud

      - name: Deploy to Dagster Cloud Serverless
        working-directory: pipeline
        run: |
          dagster-cloud serverless deploy-python-executable \
            --location-name izakaya-pipeline \
            --package-name izakaya_pipeline \
            --python-version 3.12 \
            --deployment prod
        env:
          DAGSTER_CLOUD_ORGANIZATION: ${{ secrets.DAGSTER_CLOUD_ORGANIZATION }}
          DAGSTER_CLOUD_API_TOKEN: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
